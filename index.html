<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Weather Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p.subtitle { color: #666; margin-bottom: 2rem; }
    .controls { display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; }
    select { padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 1rem; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 8px; padding: 1rem 1.25rem; border: 1px solid #eee; }
    .stat-card .label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .stat-card .value { font-size: 24px; font-weight: 500; }
    .chart-container { background: white; border-radius: 8px; padding: 1.5rem; border: 1px solid #eee; }
  </style>
</head>
<body>
  <h1>Global Weather Tracker</h1>
  <p class="subtitle">Daily maximum temperatures across 31 cities worldwide</p>

  <div class="controls">
    <select id="city-select">
      <option>Loading cities...</option>
    </select>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Hottest day</div>
      <div class="value" id="stat-hot">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Coldest day</div>
      <div class="value" id="stat-cold">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Average</div>
      <div class="value" id="stat-avg">--</div>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="weather-chart"></canvas>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";
    let chart = null;

    async function loadCities() {
      const res = await fetch(`${API}/weather/cities`);
      const cities = await res.json();
      const select = document.getElementById("city-select");
      select.innerHTML = cities.map(c => `<option value="${c}">${c}</option>`).join("");
      select.addEventListener("change", () => loadCity(select.value));
      loadCity(cities[0]);
    }

    async function loadCity(city) {
      const [historyRes, statsRes] = await Promise.all([
        fetch(`${API}/weather/history?city=${city}`),
        fetch(`${API}/weather/stats?city=${city}`)
      ]);
      const history = await historyRes.json();
      const stats = await statsRes.json();

      document.getElementById("stat-hot").textContent = stats.hottest + "°C";
      document.getElementById("stat-cold").textContent = stats.coldest + "°C";
      document.getElementById("stat-avg").textContent = stats.average + "°C";

      const labels = history.map(r => r.date).reverse();
      const temps = history.map(r => r.temperature_max_c).reverse();

      if (chart) chart.destroy();
      chart = new Chart(document.getElementById("weather-chart"), {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: `Max temperature (°C) — ${city}`,
            data: temps,
            borderColor: "#e05c2a",
            backgroundColor: "rgba(224, 92, 42, 0.1)",
            tension: 0.3,
            fill: true,
            pointRadius: 4,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { title: { display: true, text: "°C" } }
          }
        }
      });
    }

    loadCities();
  </script>
</body>
</html>
